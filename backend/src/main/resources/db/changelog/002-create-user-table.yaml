databaseChangeLog:
  - changeSet:
      id: '002'
      author: himanshu
      changes:
        - createTable:
            tableName: users_tbl
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: keycloak_id
                  type: VARCHAR(100)
                  constraints:
                    unique: true
              - column:
                  name: full_name
                  type: VARCHAR(100)
              - column:
                  name: email
                  type: VARCHAR(50)
                  constraints:
                    unique: true
              - column:
                  name: role
                  type: VARCHAR(50)
              - column:
                  name: phone
                  type: VARCHAR(15)
              - column:
                  name: created_at
                  type: DATE
