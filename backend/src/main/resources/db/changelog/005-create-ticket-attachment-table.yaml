databaseChangeLog:
  - changeSet:
      id: '005'
      author: himanshu
      changes:
        - createTable:
            tableName: ticket_attachment_tbl
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: ticket_id
                  type: UUID
              - column:
                  name: s3_key
                  type: VARCHAR(100)
              - column:
                  name: file_name
                  type: VARCHAR(100)
              - column:
                  name: uploaded_by
                  type: UUID
              - column:
                  name: uploaded_at
                  type: DATE
