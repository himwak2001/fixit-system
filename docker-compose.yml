services:
  fixit_db:
    image: bitnami/postgresql:latest
    container_name: fixit_postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: fixit_db
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - fixit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d fixit_db -U root"]
      timeout: 10s
      retries: 10
      interval: 10s
      start_period: 10s

  fixit_keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: fixit_keycloak
    ports:
      - "8180:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    command:
      - "start-dev"
    networks:
      - fixit-network

  fixit_redis:
    image: redis:latest
    container_name: fixit_redis
    ports:
      - "6379:6379"
    networks:
      - fixit-network
    command: ["redis-server"]
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 1s
      timeout: 3s
      retries: 5

networks:
  fixit-network:
    driver: "bridge"

volumes:
  db_data: